name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_path: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CirCube-Launcher-Standalone-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/circube-launcher.exe
            src-tauri/target/${{ matrix.target }}/release/circube-launcher
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/CirCube Launcher.app
          if-no-files-found: error