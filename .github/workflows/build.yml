name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64
            bin: circube-launcher.exe

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
            bin: circube-launcher

          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos
            arch: x64
            bin: circube-launcher

          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos
            arch: arm64
            bin: circube-launcher

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend deps
        run: npm install

      - name: Build
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: CirCube-Launcher-${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.bin }}